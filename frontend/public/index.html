<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Default theme -->
    <link id="theme-link" rel="stylesheet" href="../css/theme-light.css">
</head>

<body>
    <nav class="navbar navbar-light bg-light px-3">
        <span class="navbar-brand fw-bold">TradingApp</span>
        <button class="btn btn-outline-primary ms-auto" onclick="toggleTheme()">Toggle Theme</button>
    </nav>

    <div class="container mt-4">
        <div class="card p-3">
            <h5>Sample Trade Card</h5>
            <p>Stock: AAPL | Price: $185.32</p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/theme.js"></script>
</body>

</html>
